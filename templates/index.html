<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    
</head>
<body>
    <div class="container">
        <h1>Student Manager</h1>
        <form method="GET" action="/" class="student-form">
            <input type="text" name="search" placeholder="Search student">
            <button type="submit">Search</button>
            <br>
            <p>Showing results for: "{{ request.args.get('search') }}"</p>
        </form>
        <form action="/add-student" method="POST" class="student-form">
            <input type="text" name="name" placeholder="Enter student name" required>
            <input type="text" name="branch" placeholder="Enter branch" required>
            <button type="submit">Add Student</button>
        </form>

        <h2>Student List</h2>
        <p>{{ message }}</p>
        {% if students %}
            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Edit</th>
                    <th>Action</th>
                </tr>

                {% for student in students %}
                <tr>
                    <td>{{ student[0] }}</td>
                    <td>{{ student[1] }}</td>
                    <td>{{ student[2] }}</td>
                    <td>
                        <a href="/edit/{{ student[0] }}">Edit</a>
                    </td>
                    <td>
                        <form action="/delete-student/{{ student[0] }}" method="POST">
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </table>
        {% endif %}
    </div>
</body>
</html>
